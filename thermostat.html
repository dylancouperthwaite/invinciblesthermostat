<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invincibles — Office Temperature</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --slate:    #6b7a99;
      --slate-lt: #a8b4cc;
      --slate-dk: #3d4d6a;
      --blue:     #b8c4dc;
      --blue-lt:  #dce4f0;
      --white:    #ffffff;
      --off-white:#f4f6fb;
      --warm:     #e8603c;
      --cool:     #4a7fc1;
      --text:     #2a3550;
      --text-lt:  #7a8aaa;
      --glass:    rgba(255,255,255,0.55);
      --glass-border: rgba(255,255,255,0.75);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--off-white);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        linear-gradient(135deg, #e8edf7 0%, #f4f6fb 40%, #dce4f4 100%);
    }
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(135deg, rgba(107,122,153,0.18) 0%, transparent 55%),
        linear-gradient(315deg, rgba(74,127,193,0.12) 0%, transparent 55%);
    }
    /* Geometric diagonal shapes echoing the logo */
    .bg-shape {
      position: absolute;
      border: 2px solid rgba(107,122,153,0.10);
      transform-origin: center;
    }
    .bg-shape-1 {
      width: 600px; height: 600px;
      top: -150px; right: -150px;
      transform: rotate(22deg);
      border-color: rgba(107,122,153,0.12);
    }
    .bg-shape-1::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(184,196,220,0.08), transparent);
    }
    .bg-shape-2 {
      width: 400px; height: 400px;
      bottom: -80px; left: -80px;
      transform: rotate(15deg);
    }
    .bg-diag {
      position: absolute;
      background: rgba(107,122,153,0.06);
      transform-origin: center;
    }
    .bg-diag-1 {
      width: 200%; height: 3px;
      top: 35%; left: -50%;
      transform: rotate(-12deg);
      background: linear-gradient(90deg, transparent, rgba(107,122,153,0.15), transparent);
    }
    .bg-diag-2 {
      width: 200%; height: 2px;
      top: 60%; left: -50%;
      transform: rotate(-12deg);
      background: linear-gradient(90deg, transparent, rgba(107,122,153,0.10), transparent);
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 18px;
      margin-bottom: 48px;
    }
    .logo-wrap {
      width: 52px; height: 52px;
      position: relative;
    }
    /* SVG logo recreated from the geometric shape */
    .logo-wrap svg { width: 100%; height: 100%; }
    .brand-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--slate-dk);
    }
    .brand-sub {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--slate);
      margin-top: 2px;
    }

    /* ── Main card ── */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%; max-width: 520px;
      box-shadow:
        0 2px 40px rgba(61,77,106,0.10),
        0 1px 0 rgba(255,255,255,0.8) inset;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 20px;
    }

    /* ── Current temp display ── */
    .temp-display {
      text-align: center;
      margin-bottom: 44px;
    }
    .temp-current {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      letter-spacing: -4px;
      position: relative;
      display: inline-block;
    }
    .temp-current .unit {
      font-size: 36px;
      font-weight: 500;
      color: var(--slate);
      vertical-align: super;
      letter-spacing: 0;
      margin-left: 4px;
    }
    .temp-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-lt);
      letter-spacing: 0.1em;
      margin-top: 6px;
    }

    /* ── Admin temp setter ── */
    .admin-section {
      background: rgba(107,122,153,0.07);
      border: 1px solid rgba(107,122,153,0.15);
      border-radius: 14px;
      padding: 20px 24px;
    }
    .admin-row {
      display: flex; align-items: center; gap: 12px;
    }
    .admin-label {
      font-size: 12px; font-weight: 600;
      color: var(--slate-dk);
      flex: 1;
    }
    .admin-controls {
      display: flex; align-items: center; gap: 10px;
    }
    .adj-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(107,122,153,0.3);
      background: white;
      font-size: 18px;
      color: var(--slate-dk);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      font-weight: 600;
      line-height: 1;
    }
    .adj-btn:hover { background: var(--slate-dk); color: white; border-color: var(--slate-dk); transform: scale(1.05); }
    .temp-val {
      font-size: 22px; font-weight: 700;
      color: var(--text);
      min-width: 56px; text-align: center;
    }

    /* ── Vote buttons ── */
    .vote-section { margin-bottom: 40px; }
    .vote-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .vote-btn {
      padding: 24px 16px;
      border-radius: 18px;
      border: 2px solid transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }
    .vote-btn::after {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .vote-btn:hover { transform: translateY(-3px); }
    .vote-btn:active { transform: translateY(0) scale(0.97); }

    .vote-btn.up {
      background: linear-gradient(135deg, #fff0ec, #ffe4dc);
      border-color: rgba(232,96,60,0.2);
      color: var(--warm);
    }
    .vote-btn.up:hover { background: linear-gradient(135deg, #ffe4dc, #ffd0c0); border-color: var(--warm); box-shadow: 0 8px 24px rgba(232,96,60,0.18); }

    .vote-btn.down {
      background: linear-gradient(135deg, #eef3fb, #dce7f8);
      border-color: rgba(74,127,193,0.2);
      color: var(--cool);
    }
    .vote-btn.down:hover { background: linear-gradient(135deg, #dce7f8, #ccd9f4); border-color: var(--cool); box-shadow: 0 8px 24px rgba(74,127,193,0.18); }

    .vote-btn .icon { font-size: 32px; line-height: 1; }
    .vote-btn .vote-label { font-size: 13px; }
    .vote-btn .vote-count {
      font-size: 11px; font-weight: 500;
      opacity: 0.7;
    }

    .vote-btn.voted-up.up { background: linear-gradient(135deg, #ffe0d6, #ffc9b3); border-color: var(--warm); box-shadow: 0 0 0 4px rgba(232,96,60,0.12); }
    .vote-btn.voted-down.down { background: linear-gradient(135deg, #ccd9f4, #b5caf0); border-color: var(--cool); box-shadow: 0 0 0 4px rgba(74,127,193,0.12); }

    /* ── Consensus bar ── */
    .consensus-section { margin-bottom: 36px; }
    .bar-wrap {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #dce7f8, #ffeee8);
      overflow: hidden;
      position: relative;
      margin-bottom: 10px;
    }
    .bar-indicator {
      position: absolute;
      top: 0; bottom: 0;
      width: 6px;
      border-radius: 3px;
      background: var(--slate-dk);
      box-shadow: 0 0 0 3px rgba(61,77,106,0.15);
      transition: left 0.5s cubic-bezier(0.34,1.56,0.64,1);
      transform: translateX(-50%);
    }
    .bar-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; font-weight: 600;
      color: var(--text-lt);
    }
    .bar-labels .lbl-cool { color: var(--cool); }
    .bar-labels .lbl-warm { color: var(--warm); }

    .consensus-verdict {
      text-align: center;
      font-size: 15px; font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      margin-top: 14px;
      transition: all 0.3s;
    }
    .verdict-neutral { background: rgba(107,122,153,0.08); color: var(--slate-dk); }
      .verdict-warm { background: rgba(232,96,60,0.08); color: var(--warm); }
    .verdict-cool { background: rgba(74,127,193,0.10); color: var(--cool); }

    /* ── Stats ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat-num { font-size: 26px; font-weight: 800; color: var(--text); }
    .stat-lbl { font-size: 10px; font-weight: 600; color: var(--text-lt); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

    /* ── Reset ── */
    .reset-row { text-align: center; }
    .reset-btn {
      background: none; border: 1.5px solid rgba(107,122,153,0.25);
      border-radius: 8px;
      padding: 8px 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--slate);
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { background: var(--slate-dk); color: white; border-color: var(--slate-dk); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--slate-dk); color: white;
      padding: 12px 24px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: all 0.3s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(107,122,153,0.2), transparent);
      margin: 32px 0;
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-diag bg-diag-1"></div>
    <div class="bg-diag bg-diag-2"></div>
  </div>

  <div class="page">
    <header>
      <div class="logo-wrap">
        <!-- Geometric logo recreated as SVG matching the uploaded asset -->
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#8898b8"/>
            </linearGradient>
          </defs>
          <!-- Outer quad (rotated square-ish) -->
          <polygon points="20,12 88,8 80,88 12,92" stroke="url(#lg1)" stroke-width="7" fill="none" stroke-linejoin="round"/>
          <!-- Diagonal top-left to bottom-right -->
          <line x1="20" y1="12" x2="80" y2="88" stroke="url(#lg1)" stroke-width="7" stroke-linecap="round"/>
          <!-- Top cross-bar -->
          <line x1="20" y1="12" x2="88" y2="8" stroke="url(#lg1)" stroke-width="7" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Invincibles</div>
        <div class="brand-sub">Office Temperature</div>
      </div>
    </header>

    <div class="card">

      <!-- Current temperature display -->
      <div class="temp-display">
        <div class="temp-current">
          <span id="tempNum">21</span><span class="unit">°C</span>
        </div>
        <div class="temp-label">Current Office Temperature</div>
      </div>

      <!-- Vote -->
      <div class="vote-section">
        <div class="section-label">Your Vote — Is it comfortable?</div>
        <div class="vote-row">
          <button class="vote-btn up" id="voteWarm" onclick="castVote('up')">
            <div class="icon">🔥</div>
            <div class="vote-label">Too Cold</div>
            <div class="vote-count" id="upCount">0 votes</div>
          </button>
          <button class="vote-btn down" id="voteCool" onclick="castVote('down')">
            <div class="icon">❄️</div>
            <div class="vote-label">Too Hot</div>
            <div class="vote-count" id="downCount">0 votes</div>
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Consensus -->
      <div class="consensus-section">
        <div class="section-label">Today's Consensus</div>
        <div class="bar-wrap">
          <div class="bar-indicator" id="barIndicator" style="left: 50%"></div>
        </div>
        <div class="bar-labels">
          <span class="lbl-cool">❄️ Too Hot</span>
          <span class="lbl-warm">🔥 Too Cold</span>
        </div>
        <div class="consensus-verdict verdict-neutral" id="verdict">
          No votes yet — be the first!
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-lbl">Total Votes</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statUp">0</div>
          <div class="stat-lbl">Too Cold</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statDown">0</div>
          <div class="stat-lbl">Too Hot</div>
        </div>
      </div>

      <!-- Reset -->
      <div class="reset-row">
        <button class="reset-btn" onclick="resetDay()">Reset Day's Votes</button>
      </div>

      <div class="divider"></div>

      <!-- Admin setter -->
      <div class="admin-section">
        <div class="section-label">Admin — Set Temperature</div>
        <div class="admin-row">
          <div class="admin-label">Adjust thermostat reading</div>
          <div class="admin-controls">
            <button class="adj-btn" id="btnDown" aria-label="Decrease">−</button>
            <div class="temp-val"><span id="adminTemp">21</span>°C</div>
            <button class="adj-btn" id="btnUp" aria-label="Increase">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'invincibles_thermo_v1';
    let state = {
      temp: 21,
      votesUp: 0,    // "too cold" = wants warmer
      votesDown: 0,  // "too hot"  = wants cooler
      myVote: null,  // 'up' | 'down' | null — per-session
      date: today()
    };

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        // Reset votes if it's a new day
        if (saved.date !== today()) {
          state.temp = saved.temp ?? 21;
          state.date = today();
        } else {
          state = { ...state, ...saved };
        }
      } catch(e) {}
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function render() {
      // Temperature
      document.getElementById('tempNum').textContent = state.temp;
      document.getElementById('adminTemp').textContent = state.temp;

      // Vote counts
      const u = state.votesUp, d = state.votesDown, total = u + d;
      document.getElementById('upCount').textContent = u + (u === 1 ? ' vote' : ' votes');
      document.getElementById('downCount').textContent = d + (d === 1 ? ' vote' : ' votes');
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statUp').textContent = u;
      document.getElementById('statDown').textContent = d;

      // Highlight my vote
      document.getElementById('voteWarm').className = 'vote-btn up' + (state.myVote === 'up' ? ' voted-up' : '');
      document.getElementById('voteCool').className = 'vote-btn down' + (state.myVote === 'down' ? ' voted-down' : '');

      // Consensus bar: 0% = all cool, 100% = all warm
      let pct = 50;
      if (total > 0) pct = (u / total) * 100;
      document.getElementById('barIndicator').style.left = pct + '%';

      // Verdict
      const verdict = document.getElementById('verdict');
      if (total === 0) {
        verdict.textContent = 'No votes yet — be the first!';
        verdict.className = 'consensus-verdict verdict-neutral';
      } else {
        const diff = u - d;
        const pctWarm = Math.round((u / total) * 100);
        const pctCool = Math.round((d / total) * 100);
        if (Math.abs(diff) <= Math.max(1, total * 0.1)) {
          verdict.textContent = `Split decision — roughly comfortable (${total} vote${total===1?'':'s'})`;
          verdict.className = 'consensus-verdict verdict-neutral';
        } else if (diff > 0) {
          verdict.textContent = `🔥 ${pctWarm}% say it's too cold — consider turning up the heat`;
          verdict.className = 'consensus-verdict verdict-warm';
        } else {
          verdict.textContent = `❄️ ${pctCool}% say it's too hot — consider cooling it down`;
          verdict.className = 'consensus-verdict verdict-cool';
        }
      }
    }

    // ── Actions ────────────────────────────────────────────────────────────
    function castVote(dir) {
      if (state.myVote === dir) {
        // Undo vote
        if (dir === 'up') state.votesUp = Math.max(0, state.votesUp - 1);
        else              state.votesDown = Math.max(0, state.votesDown - 1);
        state.myVote = null;
        showToast('Vote removed');
      } else {
        // Switch or new vote
        if (state.myVote === 'up')   state.votesUp   = Math.max(0, state.votesUp - 1);
        if (state.myVote === 'down') state.votesDown = Math.max(0, state.votesDown - 1);
        if (dir === 'up') { state.votesUp++;   showToast('Voted: Too Cold 🔥'); }
        else              { state.votesDown++; showToast('Voted: Too Hot ❄️'); }
        state.myVote = dir;
      }
      save(); render();
    }

    function resetDay() {
      if (!confirm('Reset all votes for today?')) return;
      state.votesUp = 0; state.votesDown = 0; state.myVote = null; state.date = today();
      save(); render();
      showToast('Votes reset for today');
    }

    document.getElementById('btnUp').addEventListener('click', () => {
      state.temp = Math.min(35, state.temp + 1);
      save(); render();
    });
    document.getElementById('btnDown').addEventListener('click', () => {
      state.temp = Math.max(14, state.temp - 1);
      save(); render();
    });

    // ── Toast ──────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── Init ───────────────────────────────────────────────────────────────
    load();
    render();
  </script>
</body>
</html>
